// ─── STUDENT SELECTOR HEADER ─────────────────────────────
function StudentSelector({ selected, onChange }) {
  return (
    <div className="fixed top-0 left-56 right-0 z-50 bg-slate-950/95 border-b border-slate-800 backdrop-blur-sm px-8 py-3 flex items-center gap-4">
      <span className="text-slate-400 text-sm font-medium">👤 Viewing Student:</span>
      <select
        value={selected.id}
        onChange={e => onChange(parseInt(e.target.value))}
        className="student-selector rounded-xl px-4 py-2 text-sm font-semibold cursor-pointer"
        style={{minWidth: "220px"}}
      >
        {ALL_STUDENTS.map(s => (
          <option key={s.id} value={s.id}>
            {s.avatar} {s.name} — Rank #{s.rank} ({s.points.toLocaleString()} pts)
          </option>
        ))}
      </select>
      <div className="flex items-center gap-2 ml-2">
        <span className="text-2xl">{selected.avatar}</span>
        <div>
          <div className="font-display font-bold text-sm text-white">{selected.name}</div>
          <div className="text-xs text-indigo-400">Rank #{selected.rank} • {selected.points.toLocaleString()} pts • 🔥{selected.streak} days</div>
        </div>
      </div>
    </div>
  );
}

// ─── SIDEBAR ─────────────────────────────────────────────
function Sidebar({ page, setPage, student }) {

  ];
  return (
    <div className="w-56 min-h-screen bg-slate-900 border-r border-slate-800 flex flex-col py-6 px-3 fixed left-0 top-0">
      <div className="mb-8 px-3">
        <div className="font-display text-2xl font-bold text-indigo-400">Edu<span className="text-white">Track</span></div>
        <div className="text-xs text-slate-500 mt-1">WB301 – Education</div>
      </div>
      <nav className="flex flex-col gap-1 flex-1">
        {items.map(it => (
          <button key={it.id}
            onClick={() => setPage(it.id)}
            className={`sidebar-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all text-left ${
              page === it.id
                ? "bg-indigo-600 text-white"
                : "text-slate-400 hover:text-white"
            }`}>
            <span>{it.icon}</span>{it.label}
          </button>
        ))}
      </nav>
      <div className="px-3 mt-4">
        <div className="bg-slate-800 rounded-xl p-3 text-center">

      </div>
    </div>

}

// ─── DASHBOARD ───────────────────────────────────────────

  const earned = student.badges.filter(b => b.earned).length;
  const pending = student.assignments.filter(a => a.status === "Pending").length;

    { label:"Rank",       value:`#${student.rank}`,  icon:"🏆", color:"text-yellow-400" },
    { label:"Points",     value:student.points,       icon:"⚡", color:"text-indigo-400" },
    { label:"Day Streak", value:`${student.streak}🔥`,icon:"🔥", color:"text-orange-400" },
    { label:"Badges",     value:earned,               icon:"🎖️", color:"text-emerald-400"},
  ];
  const quick = [
    { id:"leaderboard", icon:"🏆", label:"Leaderboard",  sub:"See your ranking",                   color:"from-indigo-600 to-purple-600" },
    { id:"courses",     icon:"📚", label:"My Courses",    sub:"6 courses active",                   color:"from-cyan-600 to-blue-600"    },
    { id:"assignments", icon:"📝", label:"Assignments",   sub:`${pending} pending tasks`,            color:"from-rose-600 to-pink-600"    },
    { id:"liveclass",   icon:"🎥", label:"Live Class",    sub:"Math class at 4 PM",                 color:"from-emerald-600 to-teal-600" },
  ];
  const firstName = student.name.split(" ")[0];
  return (
    <div>
      <div className="mb-6">
        <h1 className="font-display text-3xl font-bold">Good Morning, {firstName}! 👋</h1>
        <p className="text-slate-400 mt-1">You're on a <span className="text-orange-400 font-semibold">{student.streak}-day streak</span>. Keep it up!</p>
      </div>
      <div className="grid grid-cols-4 gap-4 mb-8">
        {stats.map(s => (
          <div key={s.label} className="card-hover bg-slate-900 border border-slate-800 rounded-2xl p-4 text-center">
            <div className="text-3xl mb-2">{s.icon}</div>
            <div className={`font-display text-2xl font-bold ${s.color}`}>{s.value}</div>
            <div className="text-xs text-slate-500 mt-1">{s.label}</div>
          </div>
        ))}
      </div>
      {/* Mini Course Progress */}
      <h2 className="font-display font-bold text-lg mb-3 text-slate-300">Course Overview</h2>
      <div className="grid grid-cols-3 gap-3 mb-8">
        {student.courses.slice(0,3).map(c => (
          <div key={c.id} className="bg-slate-900 border border-slate-800 rounded-xl p-3">
            <div className="flex items-center gap-2 mb-2">
              <span className="text-lg">{c.icon}</span>
              <span className="text-xs text-slate-400 truncate">{c.title.split("–")[0].trim()}</span>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-1.5">
              <div className="progress-bar h-1.5 rounded-full" style={{width:`${c.progress}%`, background:c.color}}/>
            </div>
            <div className="text-xs mt-1 font-bold" style={{color:c.color}}>{c.progress}%</div>
          </div>
        ))}
      </div>
      <h2 className="font-display font-bold text-lg mb-4 text-slate-300">Quick Access</h2>
      <div className="grid grid-cols-2 gap-4">
        {quick.map(q => (
          <button key={q.id} onClick={() => setPage(q.id)}
            className={`card-hover bg-gradient-to-br ${q.color} rounded-2xl p-5 text-left border border-white/10`}>
            <div className="text-3xl mb-2">{q.icon}</div>
            <div className="font-display font-bold text-lg">{q.label}</div>
            <div className="text-sm text-white/70">{q.sub}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

// ─── LEADERBOARD ─────────────────────────────────────────
function Leaderboard({ currentStudent }) {
  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">🏆 Leaderboard</h1>
      <p className="text-slate-400 mb-6">Top students this week</p>
      <div className="space-y-3">
        {ALL_STUDENTS.map(s => (
          <div key={s.rank}
            className={`card-hover flex items-center gap-4 p-4 rounded-2xl border ${
              s.id === currentStudent.id
                ? "bg-indigo-900/40 border-indigo-500"
                : "bg-slate-900 border-slate-800"
            }`}>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center font-display font-bold text-sm ${
              s.rank===1?"bg-yellow-500 text-black":
              s.rank===2?"bg-slate-400 text-black":
              s.rank===3?"bg-amber-700 text-white":
              "bg-slate-800 text-slate-400"
            }`}>{s.rank}</div>
            <div className="text-2xl">{s.avatar}</div>
            <div className="flex-1">
              <div className="font-semibold text-sm flex items-center gap-2">
                {s.name}
                {s.id === currentStudent.id && <span className="text-xs bg-indigo-600 px-2 py-0.5 rounded-full">Viewing</span>}
              </div>
              <div className="text-xs text-slate-500">🔥 {s.streak} day streak</div>
            </div>
            <div className="text-right">
              <div className="font-display font-bold text-indigo-400">{s.points.toLocaleString()}</div>
              <div className="text-xs text-slate-500">points</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── STREAK ──────────────────────────────────────────────
function Streak({ student }) {
  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">🔥 Streak System</h1>
      <p className="text-slate-400 mb-6">Stay consistent every day!</p>
      <div className="card-hover bg-gradient-to-br from-orange-900/40 to-red-900/40 border border-orange-500/30 rounded-2xl p-6 mb-6 text-center">
        <div className="text-6xl mb-3">🔥</div>
        <div className="font-display text-5xl font-bold text-orange-400">{student.streak}</div>
        <div className="font-display text-xl font-semibold mt-1">Day Streak!</div>
        <div className="text-slate-400 text-sm mt-2">{student.name} is on fire! Keep it up.</div>
      </div>
      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 mb-4">
        <h3 className="font-display font-bold mb-4 text-slate-300">This Week</h3>
        <div className="flex gap-2 justify-center">
          {streakDays.map((d,i) => (
            <div key={i} className="flex flex-col items-center gap-2">
              <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg ${
                student.streakThisWeek[i] ? "streak-day-active" : "streak-day-inactive"
              }`}>{student.streakThisWeek[i] ? "✓" : ""}</div>
              <div className="text-xs text-slate-500">{d}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5">
        <h3 className="font-display font-bold mb-4 text-slate-300">Last 4 Weeks</h3>
        <div className="space-y-3">
          {student.streakWeeks.map((wk,wi) => (
            <div key={wi} className="flex items-center gap-3">
              <div className="text-xs text-slate-500 w-12">Wk {wi+1}</div>
              <div className="flex gap-2">
                {wk.map((d,di) => (
                  <div key={di} className={`w-7 h-7 rounded-lg ${d?"streak-day-active opacity-80":"streak-day-inactive"}`}/>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── BADGES ──────────────────────────────────────────────
function Badges({ student }) {
  const earned = student.badges.filter(b => b.earned).length;
  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">🎖️ Badges & Achievements</h1>
      <p className="text-slate-400 mb-6">{student.name} has earned <span className="text-yellow-400 font-semibold">{earned} of {student.badges.length}</span> badges</p>
      <div className="grid grid-cols-2 gap-4">
        {student.badges.map((b,i) => (
          <div key={i} className={`card-hover rounded-2xl p-5 border ${
            b.earned
              ? "bg-gradient-to-br from-yellow-900/30 to-amber-900/30 border-yellow-600/40"
              : "bg-slate-900 border-slate-800 opacity-50"
          }`}>
            <div className="text-4xl mb-3">{b.earned ? b.icon : "🔒"}</div>
            <div className="font-display font-bold text-sm">{b.name}</div>
            <div className="text-xs text-slate-400 mt-1">{b.desc}</div>
            {b.earned && <div className="mt-2 text-xs text-yellow-400 font-semibold">✓ Earned</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── COURSES ─────────────────────────────────────────────
function Courses({ student }) {
  const [filter, setFilter] = useState("All");
  const cats = ["All","Math","Science","English","History"];
  const filtered = filter === "All" ? student.courses : student.courses.filter(c => c.category === filter);
  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">📚 My Courses</h1>
      <p className="text-slate-400 mb-5">Filter by subject category</p>
      <div className="flex gap-2 mb-6 flex-wrap">
        {cats.map(c => (
          <button key={c} onClick={() => setFilter(c)}
            className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${
              filter===c ? "bg-indigo-600 text-white" : "bg-slate-800 text-slate-400 hover:text-white"
            }`}>{c}</button>
        ))}
      </div>
      <div className="space-y-3">
        {filtered.map(c => (
          <div key={c.id} className="card-hover bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <div className="flex items-center gap-3 mb-3">
              <div className="text-2xl">{c.icon}</div>
              <div className="flex-1">
                <div className="font-semibold text-sm">{c.title}</div>
                <div className="text-xs text-slate-500">{c.category}</div>
              </div>
              <div className="font-display font-bold text-sm" style={{color:c.color}}>{c.progress}%</div>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2">
              <div className="progress-bar h-2 rounded-full" style={{width:`${c.progress}%`, background:c.color}}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ASSIGNMENTS ─────────────────────────────────────────
function Assignments({ student }) {
  const statusColor = {
    Pending:   "bg-yellow-900/50 text-yellow-400 border-yellow-700",
    Submitted: "bg-emerald-900/50 text-emerald-400 border-emerald-700",
    Late:      "bg-red-900/50 text-red-400 border-red-700",
  };
  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">📝 Assignments Tracker</h1>
      <p className="text-slate-400 mb-6">Track all pending and submitted work for {student.name}</p>
      <div className="flex gap-4 mb-6">
        {["Pending","Submitted","Late"].map(s => (
          <div key={s} className={`flex-1 rounded-xl p-3 text-center border ${statusColor[s]}`}>
            <div className="font-display font-bold text-lg">
              {student.assignments.filter(a=>a.status===s).length}
            </div>
            <div className="text-xs mt-0.5">{s}</div>
          </div>
        ))}
      </div>
      <div className="space-y-3">
        {student.assignments.map(a => (
          <div key={a.id} className="card-hover bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-center gap-4">
            <div className="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-xs font-bold text-indigo-400">
              {a.subject}
            </div>
            <div className="flex-1">
              <div className="font-semibold text-sm">{a.title}</div>
              <div className="text-xs text-slate-500 mt-0.5">Due: {a.due}</div>
            </div>
            <span className={`text-xs px-3 py-1 rounded-full border font-medium ${statusColor[a.status]}`}>
              {a.status}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── LIVE CLASS ──────────────────────────────────────────
function LiveClass({ student }) {
  const [handRaised, setHandRaised] = useState(false);
  const [chat, setChat] = useState([
    { name:"Teacher", msg:"Welcome everyone! Let's start Chapter 5." },
    { name:"Priya",   msg:"Sir, can you repeat the formula?" },
    { name:"Rohan",   msg:"I didn't understand the last part." },
  ]);
  const [input, setInput] = useState("");
  const peers = ALL_STUDENTS.filter(s => s.id !== student.id).map(s => s.avatar);

  const sendMsg = () => {
    if (!input.trim()) return;
    setChat([...chat, { name: student.name.split(" ")[0], msg: input }]);
    setInput("");
  };

  return (
    <div>
      <h1 className="font-display text-3xl font-bold mb-2">🎥 Live Class</h1>
      <p className="text-slate-400 mb-5">Mathematics – Chapter 5: Quadratic Equations</p>
      <div className="grid grid-cols-3 gap-4">
        <div className="col-span-2 space-y-4">
          <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
            <div className="bg-slate-800 h-52 flex items-center justify-center relative">
              <div className="text-center">
                <div className="text-5xl mb-2">👨‍🏫</div>
                <div className="font-display font-bold text-slate-300">Mr. Sharma</div>
                <div className="text-xs text-slate-500 mt-1">Mathematics Teacher</div>
              </div>
              <div className="absolute top-3 left-3 flex items-center gap-2 bg-red-600 px-3 py-1 rounded-full">
                <div className="w-2 h-2 bg-white rounded-full animate-ping"/>
                <span className="text-xs font-semibold">LIVE</span>
              </div>
              <div className="absolute top-3 right-3 bg-black/50 px-2 py-1 rounded-lg text-xs text-slate-300">
                👥 28 students
              </div>
            </div>
            <div className="p-4 flex items-center gap-3">
              <button className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 rounded-xl text-sm font-medium transition-all">
                🎤 Mute
              </button>
              <button className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 py-2 rounded-xl text-sm font-medium transition-all">
                📷 Camera
              </button>
              <button
                onClick={() => setHandRaised(!handRaised)}
                className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${
                  handRaised
                    ? "hand-raise-on text-white"
                    : "bg-slate-800 text-slate-300 hover:bg-yellow-700"
                }`}>
                ✋ {handRaised ? "Hand Raised!" : "Raise Hand"}
              </button>
              <button className="flex-1 bg-red-700 hover:bg-red-600 text-white py-2 rounded-xl text-sm font-medium transition-all">
                ❌ Leave
              </button>
            </div>
          </div>
          <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4">
            <div className="text-xs text-slate-500 mb-3 font-semibold uppercase tracking-wider">Students in Class</div>
            <div className="flex gap-3 flex-wrap">
              {peers.map((p,i) => (
                <div key={i} className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-xl">{p}</div>
              ))}
              <div className="w-10 h-10 bg-indigo-700 rounded-full flex items-center justify-center text-lg">{student.avatar}</div>
              <div className="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center text-xs text-slate-400">+22</div>
            </div>
          </div>
        </div>
        <div className="bg-slate-900 border border-slate-800 rounded-2xl flex flex-col">
          <div className="p-4 border-b border-slate-800">
            <div className="font-display font-bold text-sm">💬 Class Chat</div>
          </div>
          <div className="flex-1 p-3 space-y-3 overflow-y-auto" style={{maxHeight:"260px"}}>
            {chat.map((c,i) => {
              const isMe = c.name === student.name.split(" ")[0];
              return (
                <div key={i} className={`text-xs ${isMe?"text-right":""}`}>
                  <div className="text-slate-500 mb-0.5">{c.name}</div>
                  <div className={`inline-block px-3 py-1.5 rounded-xl ${
                    isMe
                      ? "bg-indigo-700 text-white"
                      : c.name==="Teacher"
                      ? "bg-emerald-900/50 text-emerald-300"
                      : "bg-slate-800 text-slate-300"
                  }`}>{c.msg}</div>
                </div>
              );
            })}
          </div>
          <div className="p-3 border-t border-slate-800 flex gap-2">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key==="Enter" && sendMsg()}
              placeholder="Type a message..."
              className="flex-1 bg-slate-800 rounded-xl px-3 py-2 text-xs outline-none text-white placeholder-slate-600"
            />
            <button onClick={sendMsg} className="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-xl text-xs font-bold transition-all">
              Send
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("dashboard");
  const [selectedId, setSelectedId] = useState(5); // default: Arjun

  const student = useMemo(() => ALL_STUDENTS.find(s => s.id === selectedId), [selectedId]);

  const pages = {
    dashboard:   <Dashboard   student={student} setPage={setPage} />,
    leaderboard: <Leaderboard currentStudent={student} />,
    streak:      <Streak      student={student} />,
    badges:      <Badges      student={student} />,
    courses:     <Courses     student={student} />,
    assignments: <Assignments student={student} />,
    liveclass:   <LiveClass   student={student} />,
  };

  return (
    <div className="flex min-h-screen">
      <Sidebar page={page} setPage={setPage} student={student} />
      <StudentSelector selected={student} onChange={setSelectedId} />
      <main className="ml-56 flex-1 p-8 pt-20 max-w-4xl">
        {pages[page]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
